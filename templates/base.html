<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detection | AI-Powered Medical Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(29, 78, 216, 0.15), transparent 25%);
            color: #f3f4f6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+') repeat;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.7) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem 0;
            position: relative;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.02em;
        }

        .brain-icon {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse-glow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5));
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.8)); }
        }

        .container.main-content {
            position: relative;
            z-index: 10;
            padding-top: 3rem;
            padding-bottom: 3rem;
        }

        .footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 4rem;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        .footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: #a5b4fc;
            text-decoration: none;
            text-shadow: 0 0 8px rgba(165, 180, 252, 0.5);
        }

        /* Floating animation for decorative elements */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: float 8s ease-in-out infinite;
            z-index: 1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -5%;
            left: -5%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            top: 40%;
            right: -10%;
            animation-delay: 2s;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), rgba(16, 185, 129, 0.05));
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            bottom: 10%;
            left: 20%;
            animation-delay: 4s;
        }
    </style>
</head>
<body>

<div class="floating-shape shape-1"></div>
<div class="floating-shape shape-2"></div>
<div class="floating-shape shape-3"></div>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand mb-0">
            <i class="fas fa-brain brain-icon"></i>
            Brain Tumor Detection
        </span>
        <div class="d-none d-md-flex align-items-center gap-3">
            <span class="badge rounded-pill border px-3 py-2" style="background: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(52, 211, 153, 0.2) !important; font-weight: 500;">
                <i class="fas fa-shield-alt me-1"></i> AI-Powered Analysis
            </span>
        </div>
    </div>
</nav>

<div class="container main-content">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    <div class="container">
        <p class="mb-2">
            <i class="fas fa-heartbeat me-2"></i>
            Empowering Healthcare with Artificial Intelligence
        </p>
        <p class="mb-2">
        <i class="fas fa-copyright me-2"></i>
        Jaidatt Kale
        <a href="https://www.linkedin.com/in/jaidattkale/"
            target="_blank" rel="noopener noreferrer">
            LinkedIn
        </a>
        <a href="https://github.com/jaidatt007"
            target="_blank" rel="noopener noreferrer">
            GitHub
        </a>
        </p>

    
        <p class="mb-0" style="font-size: 0.85rem; opacity: 0.8;">
            For research and educational purposes.
        </p>
        <p class="mb-0" style="font-size: 0.85rem; opacity: 0.8;">
            2026 Brain Tumor Detection System.
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
